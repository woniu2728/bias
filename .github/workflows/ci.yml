name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Check release version alignment
        run: python scripts/check_release_versions.py

      - name: Run critical backend lint
        run: flake8 apps config --jobs 1 --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate extensions
        run: python manage.py validate_extensions --strict

      - name: Check import boundaries
        run: lint-imports

      - name: Run pytest with coverage
        run: pytest --cov --cov-report=term --cov-report=xml --cov-fail-under=70

      - name: Run Django test runner
        run: python manage.py test

      - name: Upload coverage to Codecov (optional)
        if: success() || failure()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
